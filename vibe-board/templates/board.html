<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>vibe-board</title>
  <script src="https://unpkg.com/htmx.org@1.9.12"></script>
  <style>
    body { font-family: system-ui, sans-serif; margin: 2rem; }
    .column { border: 1px solid #ccc; border-radius: 6px; padding: 1rem; max-width: 320px; }
    .column h2 { margin-top: 0; font-size: 1rem; text-transform: uppercase; color: #555; }
    .card { background: #f7f7f7; border: 1px solid #ddd; border-radius: 4px; padding: 0.5rem; margin: 0.25rem 0; }
    form { margin-top: 1rem; display: flex; gap: 0.5rem; }
    input[type=text] { flex: 1; padding: 0.4rem; }
    button { padding: 0.4rem 0.8rem; }
  </style>
</head>
<body>
  <h1>vibe-board</h1>
  <div id="board">
    <div class="column" data-column="todo">
      <h2>Todo</h2>
      {% for task in todo_tasks %}
      <div class="card">{{ task.title }}</div>
      {% endfor %}
      <form hx-post="/tasks" hx-target="#board" hx-swap="outerHTML">
        <input type="text" name="title" placeholder="New task title" required>
        <button type="submit">Add</button>
      </form>
    </div>
  </div>
</body>
</html>
